name: CI & Deploy

on:
  push:
    branches:
      - master

# Never let two deploys of the same branch run at once; cancel the older one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type-check & build
        run: npm run build

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      # Requires repo secrets OCI_HOST, OCI_USER, OCI_SSH_KEY.
      # Env vars live in .env.production on the server (not managed by CI).
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/max/amaya-project/coffee
            git fetch origin master
            git reset --hard origin/master
            npm install
            npm run build
            pm2 restart AMAYA --update-env

      - name: Health check
        run: |
          set -e
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://api.amaya.uz/product/all || true)
            echo "attempt $i: api.amaya.uz/product/all -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "Health check failed: api.amaya.uz/product/all did not return 200"
          exit 1
