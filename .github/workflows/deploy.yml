name: CI & Deploy

on:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Type-check & build
        run: npm run build

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      # Requires repo secrets OCI_HOST, OCI_USER, OCI_SSH_KEY.
      # Env vars live in .env.production on the server (not managed by CI).
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/max/amaya-project/coffee
            git fetch origin master
            git reset --hard origin/master
            npm install
            npm run build
            pm2 restart AMAYA --update-env
